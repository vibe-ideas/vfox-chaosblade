name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e_tests:
    strategy:
      matrix:
        # ref: https://github.com/actions/runner-images
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '^1.24.2' # The Go version to download (if necessary) and use.

      - name: build & install vfox (Unix-like)
        if: runner.os != 'Windows'
        run: |
          git clone https://github.com/version-fox/vfox.git
          cd vfox
          go build -o vfox
          chmod +x vfox
          cp vfox /usr/local/bin

      - name: add vfox-chaosblade plugin
        if: runner.os != 'Windows'
        run: |
          vfox add --source https://github.com/${{ github.repository_owner }}/vfox-chaosblade/archive/${GITHUB_REF}.zip chaosblade

      - name: install chaosblade by vfox-chaosblade plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          vfox install chaosblade@1.7.4
          eval "$(vfox activate bash)"
          vfox use -g chaosblade@1.7.4
          eval "$(vfox activate bash)"
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          status=$(blade version | grep 1.7.4)
          if [ -z "$status" ]; then
            echo "chaosblade version is not 1.7.4"
            exit 1
          else
            echo "chaosblade version 1.7.4 installed successfully"
          fi

      - name: install chaosblade by vfox-chaosblade plugin (MacOS)
        if: runner.os == 'MacOS'
        run: |
          vfox install chaosblade@1.8.0
          eval "$(vfox activate bash)"
          vfox use -g chaosblade@1.8.0
          eval "$(vfox activate bash)"
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          status=$(blade version | grep 1.8.0)
          if [ -z "$status" ]; then
            echo "chaosblade version is not 1.8.0"
            exit 1
          else
            echo "chaosblade version 1.8.0 installed successfully"
          fi

      - name: install chaosblade by vfox-chaosblade plugin via mise (Linux)
        if: runner.os == 'Linux'
        env:
          PLUGIN_REF: ${{ github.head_ref || github.sha }}
        run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$PATH"
          $HOME/.local/bin/mise plugins install --force chaosblade "https://github.com/${{ github.repository }}.git#${PLUGIN_REF}"
          $HOME/.local/bin/mise use -g "chaosblade@1.7.4"
          status=$($HOME/.local/bin/mise exec -- blade version | grep 1.7.4)
          if [ -z "$status" ]; then
            echo "chaosblade version via mise is not 1.7.4"
            exit 1
          else
            echo "chaosblade version 1.7.4 installed successfully via mise"
          fi

      - name: install chaosblade by vfox-chaosblade plugin via mise (macOS)
        if: runner.os == 'MacOS'
        env:
          PLUGIN_REF: ${{ github.head_ref || github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "=== Debug Output ===" > debug.log
          
          echo "=== 1. Install mise ===" >> debug.log
          curl https://mise.run | sh 2>&1 >> debug.log
          export PATH="$HOME/.local/bin:$PATH"
          
          echo "=== 2. Install plugin ===" >> debug.log
          $HOME/.local/bin/mise plugins install --force chaosblade "https://github.com/${{ github.repository }}.git#${PLUGIN_REF}" 2>&1 >> debug.log
          echo "Exit code: $?" >> debug.log
          
          echo "=== 3. Use chaosblade ===" >> debug.log
          $HOME/.local/bin/mise use -g "chaosblade@1.8.0" 2>&1 >> debug.log
          echo "Exit code: $?" >> debug.log
          
          echo "=== 4. Exec blade version ===" >> debug.log
          $HOME/.local/bin/mise exec -- blade version 2>&1 >> debug.log
          echo "Exit code: $?" >> debug.log
          
          cat debug.log
          
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PAYLOAD=$(jq -n --arg body "### macOS CI Debug Log
          \`\`\`
          $(cat debug.log)
          \`\`\`" '{body: $body}')
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d "$PAYLOAD"
          fi
          
          $HOME/.local/bin/mise exec -- blade version | grep 1.8.0

